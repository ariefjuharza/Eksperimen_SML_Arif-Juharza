name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'breast_cancer_raw/**'
      - 'preprocessing/**'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib numpy

      - name: Run Automate Preprocessing
        run: |
          python preprocessing/automate_Arif-Juharza.py

      - name: Commit and Push Processed Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add breast_cancer_preprocessing/
          git commit -m "Auto-update processed data" || echo "No changes to commit"
          git push
